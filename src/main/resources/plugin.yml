name: TagsKeepers
version: 1.3
main: com.tagskeeper.Main
api-version: '1.20'
softdepend:
  - PlaceholderAPI

commands:
  tags:
    description: Open tags menu
    aliases:
      - tag

  reloadtags:
    description: Reload plugin

permissions:
  tagskeeper.owner:
    default: op
  tagskeeper.perms.reload:
    default: op